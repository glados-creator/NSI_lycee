<!DOCTYPE html>
<html>
 <head>
  <meta charset = 'utf-8'>
  <title>Exercice 4</title>
 </head>
 <body>

  <form>
   <input id = 'valeur' type = "text" name = "nombre">
   <input id = 'bouton' type = "button" value = "cube">
  </form>

  <script type = "text/javascript">
    let cube = document.getElementById('bouton');
    cube.onmouseover = function() {
	    arg=document.getElementById('valeur').value;
      console.log(arg);
      //renvoie si le nombre est premier ou non
		  var n = arg;
      var k = 2;
      var premier = true;
      while (k < n && k != 0) {
        reste = n % k;
        if (reste != 0) {
          k += 1;
        } else {
          premier = false;
          k = n + 1;
        };
      };
      if (premier === true) {
          console.log("n est premier");
          alert("premier");
       } else {
          console.log("n n’est pas premier");
          alert("pas premier");
       }
    }
  </script>
 </body>
